<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG — Design Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F0E8;
  --surface: #FDFAF4;
  --surface2: #EDE8DF;
  --border: #D8D0C0;
  --border-light: #EDE8DF;
  --accent: #B8860B;
  --accent-light: #F5E6B8;
  --accent-deep: #8B6508;
  --text: #1A1510;
  --text-2: #4A4035;
  --text-3: #8A7D6E;
  --success: #2D6A4F;
  --danger: #9B2335;
  --blue: #1B4F8A;
  --serif: 'Playfair Display', Georgia, serif;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --shadow: 0 1px 3px rgba(26,21,16,.06), 0 4px 16px rgba(26,21,16,.08);
  --shadow-lg: 0 4px 8px rgba(26,21,16,.06), 0 12px 40px rgba(26,21,16,.12);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
}

/* Grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.5;
}

/* HEADER */
#header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex;
  align-items: stretch;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 var(--border), var(--shadow);
  flex-wrap: wrap;
}

#logo-wrap {
  padding: 10px 14px 10px 0;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  margin-right: 12px;
  flex-shrink: 0;
}

#logo-icon {
  width: 26px;
  height: 26px;
  background: var(--text);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

#logo-icon svg { width: 14px; height: 14px; fill: var(--accent); }

#logo-text {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
}

#logo-sub {
  font-family: var(--mono);
  font-size: 7px;
  color: var(--text-3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

#tabs {
  display: flex;
  align-items: center;
  gap: 0;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  padding: 14px 14px;
  background: transparent;
  border: none;
  border-radius: 0;
  color: var(--text-3);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
  position: relative;
  white-space: nowrap;
  flex-shrink: 0;
}
.tab-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 2px;
  background: var(--accent);
  transition: width .2s;
  border-radius: 2px;
}
.tab-btn.active { color: var(--text); font-weight: 600; }
.tab-btn.active::after { width: 60%; }
.tab-btn:hover:not(.active) { color: var(--text-2); background: var(--surface2); }

#sync-badge {
  align-self: center;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--success);
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  background: #E8F5EE;
  border-radius: 20px;
  border: 1px solid #C3E6D0;
  flex-shrink: 0;
  margin-left: 8px;
}

/* MAIN */
#main { padding: 28px 24px; max-width: 860px; margin: 0 auto; }
.page { display: none; animation: fadeIn .2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card-accent { border-left: 3px solid var(--accent); }
.card-success { border-left: 3px solid var(--success); }

/* SECTION TITLES */
.sec-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border-light);
}

/* LABELS & INPUTS */
label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-3);
  display: block;
  margin-bottom: 6px;
}

input[type=text], input[type=number], input[type=date], textarea, select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  width: 100%;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
  appearance: none;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-light);
}
textarea { resize: vertical; min-height: 64px; }

/* GRID */
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* RPE */
.rpe-row { display: flex; align-items: center; gap: 12px; }
input[type=range] { flex: 1; accent-color: var(--accent); height: 4px; }
#rpe-val {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 900;
  color: var(--accent);
  min-width: 32px;
  line-height: 1;
}

/* BUTTONS */
.btn {
  padding: 10px 20px;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border: none;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: none; }

.btn-primary {
  background: var(--text);
  color: var(--bg);
  box-shadow: 0 2px 8px rgba(26,21,16,.2);
}
.btn-primary:hover { background: var(--text-2); box-shadow: 0 4px 16px rgba(26,21,16,.25); }

.btn-gold {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 8px rgba(184,134,11,.3);
}
.btn-gold:hover { background: var(--accent-deep); }

.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border) !important;
}
.btn-ghost:hover { background: var(--surface2); }

.btn-danger { background: #FEF0F2; color: var(--danger); border: 1px solid #F5C6CC !important; }
.btn-full { width: 100%; justify-content: center; padding: 13px; font-size: 14px; }
.btn-dashed { border: 1.5px dashed var(--border) !important; background: transparent; color: var(--text-3); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { background: none; border: none; color: var(--text-3); cursor: pointer; padding: 4px; font-size: 16px; }
.btn-icon:hover { color: var(--danger); }

/* EXERCISE CARDS */
.ex-name-display {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.ex-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
}
.tag-gold { background: var(--accent-light); color: var(--accent-deep); border-color: #D4A820; }

/* SERIES GRID */
.series-header { display: grid; gap: 8px; margin-bottom: 6px; }
.series-header.weighted { grid-template-columns: 32px 1fr 1fr 1fr 28px; }
.series-header.bodyweight { grid-template-columns: 32px 1fr 1fr 28px; }
.series-row { display: grid; gap: 8px; margin-bottom: 8px; align-items: center; }
.series-row.weighted { grid-template-columns: 32px 1fr 1fr 1fr 28px; }
.series-row.bodyweight { grid-template-columns: 32px 1fr 1fr 28px; }
.col-hdr { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; }
.series-num {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}
.series-input { padding: 8px 10px !important; text-align: center; }
.remove-set { background: none; border: none; color: var(--border); cursor: pointer; font-size: 18px; transition: color .15s; }
.remove-set:hover { color: var(--danger); }

/* LAST PERF BOX */
.last-perf {
  background: linear-gradient(135deg, var(--accent-light), #FBF3D8);
  border: 1px solid #D4A820;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 14px;
}
.last-perf-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-deep); margin-bottom: 4px; }
.last-perf-data { font-family: var(--mono); font-size: 12px; color: var(--text-2); }

/* PICKER */
.picker-card { border: 1px solid var(--accent) !important; box-shadow: 0 0 0 3px var(--accent-light); }
.picker-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
.ex-list { max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
.ex-item {
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
  background: var(--bg);
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
  transition: all .1s;
}
.ex-item:hover { border-color: var(--accent); background: var(--accent-light); }
.ex-item-name { font-size: 13px; font-weight: 500; }
.ex-item-type { font-family: var(--mono); font-size: 10px; color: var(--text-3); }
.type-toggle { display: flex; gap: 6px; margin-top: 4px; }
.type-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-family: var(--sans); font-size: 12px; font-weight: 500; background: var(--bg); color: var(--text-3); transition: all .15s; }
.type-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ALERTS */
.alert { border-radius: 10px; padding: 13px 16px; margin-bottom: 16px; font-family: var(--sans); font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; }
.alert-success { background: #E8F5EE; border: 1px solid #A8D5B8; color: var(--success); }
.alert-error { background: #FEF0F2; border: 1px solid #F5C6CC; color: var(--danger); }

/* HISTORIQUE */
.session-card { cursor: pointer; transition: box-shadow .15s; }
.session-card:hover { box-shadow: var(--shadow-lg); }
.session-date-big { font-family: var(--serif); font-size: 17px; font-weight: 700; color: var(--text); }
.session-meta { display: flex; gap: 14px; margin-top: 5px; flex-wrap: wrap; }
.session-meta span { font-family: var(--mono); font-size: 11px; color: var(--text-3); }
.session-badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 260px; }
.badge { font-family: var(--mono); font-size: 10px; color: var(--accent-deep); background: var(--accent-light); padding: 3px 9px; border-radius: 20px; border: 1px solid #D4A820; }
.session-detail { display: none; margin-top: 16px; border-top: 1px solid var(--border-light); padding-top: 16px; }
.session-detail.open { display: block; }
.session-note { margin-bottom: 14px; padding: 10px 14px; background: var(--bg); border-radius: 8px; font-size: 12px; color: var(--text-3); font-style: italic; border-left: 2px solid var(--border); }
.ex-detail { margin-bottom: 18px; }
.ex-detail-name { font-family: var(--serif); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.ex-detail-sub { font-family: var(--mono); font-size: 10px; color: var(--text-3); font-weight: 400; text-transform: none; letter-spacing: 0; }
table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
th { text-align: left; padding: 5px 10px; color: var(--text-3); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border-light); font-weight: 400; }
td { padding: 8px 10px; border-bottom: 1px solid var(--border-light); }
td.accent { color: var(--accent-deep); font-weight: 500; }
td.muted { color: var(--text-3); }
.delete-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.delete-row span { font-size: 12px; color: var(--text-3); }
.btn-delete-ghost { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 11px; margin-top: 8px; font-family: var(--mono); padding: 0; letter-spacing: 1px; text-transform: uppercase; }
.btn-delete-ghost:hover { color: var(--danger); }

/* ANALYSE */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
.stat-card { text-align: center; margin-bottom: 0; }
.stat-val { font-family: var(--serif); font-size: 42px; font-weight: 900; color: var(--accent); line-height: 1; }
.stat-lbl { font-family: var(--mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 6px; }
.top-ex-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.top-ex-rank { font-family: var(--serif); font-size: 14px; color: var(--text-3); min-width: 20px; font-weight: 700; }
.top-ex-bar { height: 4px; background: linear-gradient(90deg, var(--accent), var(--accent-light)); border-radius: 4px; min-width: 4px; }
.top-ex-count { font-family: var(--mono); font-size: 11px; color: var(--text-3); min-width: 32px; text-align: right; }
.chart-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-3); margin-bottom: 10px; margin-top: 22px; }
.chart-wrap { position: relative; height: 180px; margin-bottom: 8px; }
.no-data { text-align: center; padding: 40px; color: var(--text-3); font-size: 13px; }
.perf-table th { font-size: 10px; }
.perf-table td { padding: 9px 10px; font-size: 12px; }

/* PR CARDS */
.pr-item { padding: 14px 0; border-bottom: 1px solid var(--border-light); }
.pr-item:last-child { border-bottom: none; }
.pr-name { font-family: var(--serif); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.pr-metrics { display: flex; gap: 20px; flex-wrap: wrap; }
.pr-metric { display: flex; flex-direction: column; gap: 2px; }
.pr-metric-label { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); }
.pr-metric-val { font-family: var(--serif); font-size: 24px; font-weight: 900; line-height: 1; }
.pr-metric-sub { font-family: var(--mono); font-size: 10px; color: var(--text-3); }

/* MENSURATIONS */
.mens-summary { display: flex; gap: 14px; flex-wrap: wrap; justify-content: space-around; }
.mens-item { text-align: center; }
.mens-val { font-family: var(--serif); font-size: 28px; font-weight: 900; line-height: 1; }
.mens-unit { font-family: var(--mono); font-size: 10px; color: var(--text-3); margin-top: 2px; }
.mens-label { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }

/* LOADING */
.loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 999;
}
.loading-logo { font-family: var(--serif); font-size: 52px; font-weight: 900; color: var(--text); letter-spacing: 2px; }
.loading-sub { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text-3); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PERIOD SELECT */
.period-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 7px 14px;
  color: var(--text-2);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1px;
  outline: none;
  cursor: pointer;
  appearance: none;
}

/* EMPTY */
.empty { text-align: center; padding: 80px 0; color: var(--text-3); font-family: var(--serif); font-size: 18px; }
.empty-sub { font-family: var(--mono); font-size: 11px; color: var(--text-3); margin-top: 8px; letter-spacing: 1px; }

/* PR CONFIG */
.pr-check-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 8px; cursor: pointer;
  border: 1px solid var(--border); margin-bottom: 6px;
  background: var(--bg); transition: all .15s;
}
.pr-check-item:hover { background: var(--accent-light); border-color: var(--accent); }
.pr-check-item.selected { background: var(--accent-light); border-color: var(--accent); }
.pr-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .15s; }
.pr-check-item.selected .pr-checkbox { background: var(--accent); border-color: var(--accent); }

@media (max-width: 600px) {
  .grid3 { grid-template-columns: 1fr 1fr; }
  .grid3 > div:first-child { grid-column: 1 / -1; }
  .grid3 > div:last-child { grid-column: 1 / -1; }
  .stats-grid { grid-template-columns: repeat(3,1fr); }
  #main { padding: 14px; }
  #header { padding: 0 12px; }
  #logo-sub { display: none; }
  #sync-badge span:last-child { display: none; }
  #sync-badge { padding: 4px 8px; }
  .stat-val { font-size: 28px; }
  .tab-btn { padding: 14px 12px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-logo">Iron Log</div>
  <div class="spinner"></div>
  <div class="loading-sub">Chargement en cours</div>
</div>

<div id="header">
  <div id="logo-wrap">
    <div id="logo-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29l-1.43-1.43z"/>
      </svg>
    </div>
    <div>
      <div id="logo-text">Iron Log</div>
      <div id="logo-sub">Journal d'entraînement</div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('seance',this)">Séance</button>
    <button class="tab-btn" onclick="showTab('historique',this)">Historique</button>
    <button class="tab-btn" onclick="showTab('analyse',this)">Analyse</button>
    <button class="tab-btn" onclick="showTab('mensurations',this)">Corps</button>
  </div>
  <div id="sync-badge">
    <span style="width:6px;height:6px;background:var(--success);border-radius:50%;display:inline-block;"></span>
    Synchronisé
  </div>
</div>

<div id="main">

  <!-- PAGE SÉANCE -->
  <div id="page-seance" class="page active">
    <div id="save-alert" style="display:none"></div>
    <div class="card">
      <div class="sec-label">Informations séance</div>
      <div class="grid3">
        <div><label>Date</label><input type="date" id="s-date"></div>
        <div><label>Durée (min)</label><input type="number" id="s-duration" placeholder="Auto" inputmode="numeric" oninput="this.dataset.manual='true';this.style.borderColor=''"></div>
        <div>
          <label>RPE — effort perçu</label>
          <div class="rpe-row">
            <input type="range" id="rpe-slider" min="1" max="10" value="7" oninput="document.getElementById('rpe-val').textContent=this.value">
            <span id="rpe-val">7</span>
          </div>
        </div>
      </div>
      <div><label>Notes libres</label><textarea id="s-notes" placeholder="Ressenti, contexte, objectifs..."></textarea></div>
    </div>
    <div id="exercises-list"></div>
    <div id="add-ex-btn-wrap">
      <button class="btn btn-ghost btn-full btn-dashed" onclick="openPicker()">+ Ajouter un exercice</button>
    </div>
    <div id="picker" class="card picker-card" style="display:none;margin-top:16px;">
      <div class="picker-title">Ajouter un exercice</div>
      <input type="text" id="picker-search" placeholder="Rechercher ou créer..." oninput="filterExercises()" autocomplete="off" style="margin-bottom:12px;">
      <div class="grid2" style="margin-bottom:12px;">
        <div><label>Repos avant (s)</label><input type="number" id="picker-rest" placeholder="120" inputmode="numeric"></div>
        <div>
          <label>Type (si nouvel exercice)</label>
          <div class="type-toggle">
            <button class="type-btn active" id="type-weighted" onclick="setNewType('weighted')">🏋️ Charge</button>
            <button class="type-btn" id="type-bodyweight" onclick="setNewType('bodyweight')">🤸 Corps</button>
          </div>
        </div>
      </div>
      <div id="ex-list" class="ex-list"></div>
      <div id="picker-actions" style="display:flex;gap:8px;margin-top:8px;"></div>
    </div>
    <div style="height:16px"></div>
    <button id="save-btn" class="btn btn-gold btn-full" onclick="saveSession()" style="display:none">✓ Enregistrer la séance</button>
  </div>

  <!-- PAGE HISTORIQUE -->
  <div id="page-historique" class="page">
    <div id="history-content"></div>
  </div>

  <!-- PAGE ANALYSE -->
  <div id="page-analyse" class="page">
    <div id="analyse-content"></div>
  </div>

  <!-- PAGE MENSURATIONS -->
  <div id="page-mensurations" class="page">
    <div id="mens-alert" style="display:none"></div>
    <div class="card">
      <div class="sec-label">Nouvelle prise de mesures</div>
      <div class="grid2" style="margin-bottom:14px;">
        <div><label>Date</label><input type="date" id="mens-date"></div>
        <div><label>Poids (kg)</label><input type="number" step="0.1" id="mens-poids" placeholder="75.0" inputmode="decimal"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
        <div><label>Tour de poitrine (cm)</label><input type="number" step="0.5" id="mens-poitrine" placeholder="100" inputmode="decimal"></div>
        <div><label>Tour de bras (cm)</label><input type="number" step="0.5" id="mens-bras" placeholder="35" inputmode="decimal"></div>
        <div><label>Tour de taille (cm)</label><input type="number" step="0.5" id="mens-taille" placeholder="80" inputmode="decimal"></div>
        <div><label>Tour de cuisse (cm)</label><input type="number" step="0.5" id="mens-cuisse" placeholder="55" inputmode="decimal"></div>
        <div><label>Tour de mollet (cm)</label><input type="number" step="0.5" id="mens-mollet" placeholder="36" inputmode="decimal"></div>
      </div>
      <button class="btn btn-gold btn-full" onclick="saveMensuration()">✓ Enregistrer les mesures</button>
    </div>
    <div id="mens-history"></div>
    <div id="mens-charts-area"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYhGyXRRwBQGbsW7eTrRUSWLi_LBsNXA80Wiarld-HlfZ0ZSk9SWocCtHR95bpKDzN/exec';

// Override Chart.js defaults for light theme
Chart.defaults.color = '#8A7D6E';
Chart.defaults.borderColor = '#D8D0C0';

const DEFAULT_EXERCISES = [
  { id:'e1', name:'Développé couché', type:'weighted' },
  { id:'e2', name:'Développé incliné', type:'weighted' },
  { id:'e3', name:'Écarté poulie', type:'weighted' },
  { id:'e4', name:'Tirage vertical', type:'weighted' },
  { id:'e5', name:'Rowing barre', type:'weighted' },
  { id:'e6', name:'Élévations latérales', type:'weighted' },
  { id:'e7', name:'Curl biceps', type:'weighted' },
  { id:'e8', name:'Extension triceps', type:'weighted' },
  { id:'e9', name:'Squat', type:'weighted' },
  { id:'e10', name:'Presse à cuisses', type:'weighted' },
  { id:'e11', name:'Fentes', type:'weighted' },
  { id:'e12', name:'Soulevé de terre', type:'weighted' },
  { id:'e13', name:'Hip thrust', type:'weighted' },
  { id:'e14', name:'Tractions', type:'bodyweight' },
  { id:'e15', name:'Dips', type:'bodyweight' },
  { id:'e16', name:'Pompes', type:'bodyweight' },
  { id:'e17', name:'Gainage', type:'bodyweight' },
];

let exercises = JSON.parse(localStorage.getItem('il_exercises') || 'null') || DEFAULT_EXERCISES;
let sessions = [];
let mensurations = [];
let sessionExs = [];
let newType = 'weighted';
let charts = {};

// ─── SYNC ───────────────────────────────────────────────────────────────────
function setSyncStatus(state, msg) {
  const el = document.getElementById('sync-badge');
  const dot = el.querySelector('span');
  el.lastChild.textContent = ' ' + msg;
  dot.style.background = state === 'ok' ? 'var(--success)' : state === 'error' ? 'var(--danger)' : 'var(--accent)';
}

async function loadFromSheets() {
  try {
    setSyncStatus('loading', 'Chargement...');
    const res = await fetch(SCRIPT_URL + '?action=load');
    const data = await res.json();
    sessions = data.sessions || [];
    mensurations = data.mensurations || [];
    setSyncStatus('ok', 'Synchronisé');
  } catch(e) {
    setSyncStatus('error', 'Hors ligne');
    sessions = JSON.parse(localStorage.getItem('il_sessions_cache') || '[]');
    mensurations = JSON.parse(localStorage.getItem('il_mens_cache') || '[]');
  }
  document.getElementById('loading-screen').style.display = 'none';
}

async function saveToSheets(session) {
  setSyncStatus('loading', 'Sauvegarde...');
  try {
    await fetch(SCRIPT_URL + '?action=save', { method:'POST', body: JSON.stringify(session) });
    localStorage.setItem('il_sessions_cache', JSON.stringify(sessions));
    setSyncStatus('ok', 'Synchronisé');
    return true;
  } catch(e) { setSyncStatus('error', 'Erreur sync'); return false; }
}

async function deleteFromSheets(id) {
  try {
    await fetch(SCRIPT_URL + '?action=delete&id=' + id);
    setSyncStatus('ok', 'Synchronisé');
    return true;
  } catch(e) { setSyncStatus('error', 'Erreur sync'); return false; }
}

// ─── INIT ───────────────────────────────────────────────────────────────────
document.querySelectorAll('input[type=number]').forEach(el => {
  if (!el.getAttribute('inputmode')) el.setAttribute('inputmode', el.step && parseFloat(el.step) < 1 ? 'decimal' : 'numeric');
});
document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
document.getElementById('mens-date').value = new Date().toISOString().split('T')[0];
loadFromSheets();

// ─── ONGLETS ────────────────────────────────────────────────────────────────
function showTab(t, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  btn.classList.add('active');
  if (t === 'historique') renderHistory();
  if (t === 'analyse') renderAnalyse();
  if (t === 'mensurations') renderMensurations();
}

function fmtDate(d) {
  if (!d) return '';
  let date;
  if (typeof d === 'string') {
    if (/^\d{4}-\d{2}-\d{2}$/.test(d)) date = new Date(d + 'T00:00:00');
    else if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) { const p = d.split('/'); date = new Date(p[2]+'-'+p[1]+'-'+p[0]+'T00:00:00'); }
    else date = new Date(d);
  } else date = new Date(d);
  if (!date || isNaN(date.getTime())) return String(d);
  return date.toLocaleDateString('fr-FR', { day:'numeric', month:'short', year:'numeric' });
}

// ─── EXERCICES SÉANCE ────────────────────────────────────────────────────────
function getLastPerf(name) {
  for (const s of sessions) {
    const ex = s.exercises?.find(e => e.name === name);
    if (ex) return { date: fmtDate(s.date), sets: ex.sets, type: ex.type };
  }
  return null;
}

function renderExercises() {
  const el = document.getElementById('exercises-list');
  el.innerHTML = '';
  sessionExs.forEach((ex, i) => {
    const isW = ex.type === 'weighted';
    const headerCols = isW ? ['#','Reps','Charge (kg)','Repos (s)',''] : ['#','Reps','Leste (kg)','Repos (s)',''];
    let setsHTML = '';
    ex.sets.forEach((set, j) => {
      setsHTML += `
        <div class="series-row weighted" style="align-items:center;">
          <div class="series-num">S${j+1}</div>
          <input type="number" class="series-input" value="${set.reps}" placeholder="12" inputmode="numeric" oninput="updateSet(${i},${j},'reps',this.value)">
          <input type="number" class="series-input" step="0.5" value="${set.weight||''}" placeholder="—" inputmode="decimal" oninput="updateSet(${i},${j},'weight',this.value)">
          <input type="number" class="series-input" value="${set.restAfter}" placeholder="90" inputmode="numeric" oninput="updateSet(${i},${j},'restAfter',this.value)">
          <button class="remove-set" onclick="removeSet(${i},${j})">−</button>
        </div>`;
    });
    const lastPerf = getLastPerf(ex.name);
    let lastPerfHTML = '';
    if (lastPerf) {
      const summary = lastPerf.sets.map((s,j) => lastPerf.type === 'weighted' ? `S${j+1} : ${s.reps}×${s.weight}kg` : `S${j+1} : ${s.reps} reps`).join('  ·  ');
      lastPerfHTML = `<div class="last-perf"><div class="last-perf-label">Dernière fois · ${lastPerf.date}</div><div class="last-perf-data">${summary}</div></div>`;
    }
    el.innerHTML += `
      <div class="card card-accent">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
          <div>
            <div class="ex-name-display">${ex.name}</div>
            <div class="ex-tags">
              <span class="tag ${isW?'tag-gold':''}">${isW ? '🏋️ Avec charge' : '🤸 Poids de corps'}</span>
              ${ex.restBefore > 0 ? `<span class="tag">⏱ Repos avant : ${ex.restBefore}s</span>` : ''}
            </div>
          </div>
          <button class="btn-icon" onclick="removeEx(${i})">✕</button>
        </div>
        ${lastPerfHTML}
        <div class="series-header weighted" style="margin-bottom:8px;">
          ${headerCols.map(h=>`<div class="col-hdr">${h}</div>`).join('')}
        </div>
        ${setsHTML}
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="addSet(${i})">+ Série</button>
      </div>`;
  });
  document.getElementById('save-btn').style.display = sessionExs.length > 0 ? 'flex' : 'none';
}

function addSet(i) { const s=sessionExs[i].sets, p=s[s.length-1]; s.push({reps:p.reps,weight:p.weight,restAfter:p.restAfter}); renderExercises(); calcDuration(); }
function removeSet(i,j) { if(sessionExs[i].sets.length>1){sessionExs[i].sets.splice(j,1);renderExercises();calcDuration();} }
function updateSet(i,j,f,v) { sessionExs[i].sets[j][f]=v; calcDuration(); }
function removeEx(i) { sessionExs.splice(i,1); renderExercises(); calcDuration(); }

function calcDuration() {
  if (!sessionExs.length) return;
  let total = 0;
  sessionExs.forEach(ex => {
    total += ex.restBefore || 0;
    ex.sets.forEach(set => { total += (parseInt(set.reps)||0)*3 + (parseInt(set.restAfter)||0); });
  });
  const f = document.getElementById('s-duration');
  if (!f.dataset.manual || f.dataset.manual==='false') {
    f.value = Math.max(1, Math.round(total/60));
    f.style.borderColor = 'var(--accent)';
  }
}

// ─── PICKER ─────────────────────────────────────────────────────────────────
function openPicker() { document.getElementById('picker').style.display='block'; document.getElementById('add-ex-btn-wrap').style.display='none'; document.getElementById('picker-search').value=''; document.getElementById('picker-rest').value=''; filterExercises(); setTimeout(()=>document.getElementById('picker-search').focus(),100); }
function closePicker() { document.getElementById('picker').style.display='none'; document.getElementById('add-ex-btn-wrap').style.display='block'; }
function setNewType(t) { newType=t; document.getElementById('type-weighted').classList.toggle('active',t==='weighted'); document.getElementById('type-bodyweight').classList.toggle('active',t==='bodyweight'); }
function filterExercises() {
  const q = document.getElementById('picker-search').value.trim().toLowerCase();
  const filtered = q ? exercises.filter(e=>e.name.toLowerCase().includes(q)) : exercises;
  const exactMatch = exercises.find(e=>e.name.toLowerCase()===q);
  document.getElementById('ex-list').innerHTML = filtered.slice(0,6).map(ex=>`
    <div class="ex-item" onclick="pickExById('${ex.id}')">
      <span class="ex-item-name">${ex.name}</span>
      <span class="ex-item-type">${ex.type==='weighted'?'charge':'corps'}</span>
    </div>`).join('');
  const actEl = document.getElementById('picker-actions');
  if (q&&!exactMatch) actEl.innerHTML=`<button class="btn btn-primary" style="flex:1" onclick="addCustomEx()">+ Créer « ${q} »</button><button class="btn btn-ghost" onclick="closePicker()">Annuler</button>`;
  else if (exactMatch) actEl.innerHTML=`<button class="btn btn-primary" style="flex:1" onclick="pickExById('${exactMatch.id}')">Ajouter</button><button class="btn btn-ghost" onclick="closePicker()">Annuler</button>`;
  else actEl.innerHTML=`<button class="btn btn-ghost" onclick="closePicker()">Annuler</button>`;
}
function pickExById(id) {
  const ex = exercises.find(e=>e.id===id); if(!ex) return;
  const rest = parseInt(document.getElementById('picker-rest').value)||0;
  sessionExs.push({uid:Date.now().toString(),name:ex.name,type:ex.type,restBefore:rest,sets:[{reps:'',weight:'',restAfter:''}]});
  closePicker(); renderExercises(); calcDuration();
}
function addCustomEx() {
  const name = document.getElementById('picker-search').value.trim(); if(!name) return;
  let ex = exercises.find(e=>e.name.toLowerCase()===name.toLowerCase());
  if(!ex){ex={id:'c_'+Date.now(),name,type:newType};exercises.push(ex);localStorage.setItem('il_exercises',JSON.stringify(exercises));}
  pickExById(ex.id);
}

// ─── ENREGISTRER ─────────────────────────────────────────────────────────────
async function saveSession() {
  const cleanExs = sessionExs.map(ex=>({...ex,sets:ex.sets.filter(s=>s.reps!=='')})).filter(ex=>ex.sets.length>0);
  if(!cleanExs.length){showAlert('Ajoute au moins une série avec des répétitions !','error');return;}
  const session = { id:Date.now().toString(), date:document.getElementById('s-date').value, duration:parseInt(document.getElementById('s-duration').value)||0, rpe:parseInt(document.getElementById('rpe-slider').value), notes:document.getElementById('s-notes').value, exercises:cleanExs };
  document.getElementById('save-btn').disabled=true; document.getElementById('save-btn').textContent='Enregistrement...';
  const ok = await saveToSheets(session);
  if(ok){
    sessions.unshift(session); sessionExs=[];
    document.getElementById('s-date').value=new Date().toISOString().split('T')[0];
    const df=document.getElementById('s-duration'); df.value=''; df.dataset.manual='false'; df.style.borderColor='';
    document.getElementById('rpe-slider').value=7; document.getElementById('rpe-val').textContent='7'; document.getElementById('s-notes').value='';
    renderExercises(); showAlert('✓ Séance enregistrée et synchronisée !','success');
  } else showAlert('✕ Erreur de connexion','error');
  document.getElementById('save-btn').disabled=false; document.getElementById('save-btn').textContent='✓ Enregistrer la séance';
}
function showAlert(msg,type){const el=document.getElementById('save-alert');el.className='alert alert-'+type;el.textContent=msg;el.style.display='flex';setTimeout(()=>el.style.display='none',4000);}

// ─── HISTORIQUE ───────────────────────────────────────────────────────────────
function renderHistory() {
  const el = document.getElementById('history-content');
  const muscuSessions = sessions.filter(s=>s.sessionType!=='running');
  if(!muscuSessions.length){el.innerHTML='<div class="empty">Aucune séance enregistrée<div class="empty-sub">Commence ta première séance</div></div>';return;}
  el.innerHTML=`<div class="sec-label">${muscuSessions.length} séance${muscuSessions.length>1?'s':''}</div>`;
  muscuSessions.forEach(s=>{
    const exBadges=s.exercises.slice(0,3).map(e=>`<span class="badge">${e.name}</span>`).join('');
    const more=s.exercises.length>3?`<span style="font-family:var(--mono);font-size:10px;color:var(--text-3)">+${s.exercises.length-3}</span>`:'';
    let detailHTML=s.notes?`<div class="session-note">${s.notes}</div>`:'';
    s.exercises.forEach(ex=>{
      const isW=ex.type==='weighted';
      detailHTML+=`<div class="ex-detail">
        <div class="ex-detail-name">${ex.name}<span class="ex-detail-sub">${isW?'charge':'poids de corps'}</span>${ex.restBefore>0?`<span class="ex-detail-sub">⏱ ${ex.restBefore}s avant</span>`:''}</div>
        <table><thead><tr><th>#</th><th>Reps</th>${isW?'<th>Charge</th>':'<th>Leste</th>'}<th>Repos</th></tr></thead>
        <tbody>${ex.sets.map((set,j)=>`<tr><td class="muted">S${j+1}</td><td>${set.reps} reps</td><td class="accent">${set.weight?set.weight+' kg':'—'}</td><td class="muted">${set.restAfter?set.restAfter+'s':'—'}</td></tr>`).join('')}</tbody></table>
      </div>`;
    });
    detailHTML+=`<div id="del-${s.id}" style="display:none" class="delete-row"><span>Supprimer cette séance ?</span><button class="btn btn-danger btn-sm" onclick="deleteSession('${s.id}')">Confirmer</button><button class="btn btn-ghost btn-sm" onclick="document.getElementById('del-${s.id}').style.display='none'">Annuler</button></div><button class="btn-delete-ghost" onclick="document.getElementById('del-${s.id}').style.display='flex'">Supprimer</button>`;
    el.innerHTML+=`<div class="card session-card"><div style="display:flex;justify-content:space-between;align-items:center;" onclick="toggleSession('${s.id}')"><div><div class="session-date-big">${fmtDate(s.date)}</div><div class="session-meta">${s.duration>0?`<span>⏱ ${s.duration} min</span>`:''}<span>RPE ${s.rpe}/10</span><span>${s.exercises.length} exercice${s.exercises.length>1?'s':''}</span></div></div><div style="display:flex;align-items:center;gap:10px;"><div class="session-badges">${exBadges}${more}</div><span id="chev-${s.id}" style="color:var(--text-3);font-size:12px;">${'▼'}</span></div></div><div class="session-detail" id="detail-${s.id}">${detailHTML}</div></div>`;
  });
}
function toggleSession(id){const d=document.getElementById('detail-'+id),c=document.getElementById('chev-'+id),open=d.classList.toggle('open');c.textContent=open?'▲':'▼';}
async function deleteSession(id){const ok=await deleteFromSheets(id);if(ok){sessions=sessions.filter(s=>s.id!==id);renderHistory();}}

// ─── ANALYSE ─────────────────────────────────────────────────────────────────
function filterSessionsByPeriod(period) {
  const now=new Date();
  return sessions.filter(s=>{
    if(!s.date) return false;
    let d=/^\d{4}-\d{2}-\d{2}$/.test(s.date)?new Date(s.date+'T00:00:00'):new Date(s.date);
    if(isNaN(d)) return false;
    if(period==='week'){const sw=new Date(now);sw.setDate(now.getDate()-now.getDay()+(now.getDay()===0?-6:1));sw.setHours(0,0,0,0);return d>=sw;}
    if(period==='month') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='year') return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function updateStats(){
  const period=document.getElementById('stats-period')?.value||'month';
  const filtered=filterSessionsByPeriod(period).filter(s=>s.sessionType!=='running');
  const ts=filtered.reduce((sum,s)=>sum+s.exercises.reduce((a,e)=>a+e.sets.length,0),0);
  const exSet=new Set(filtered.flatMap(s=>s.exercises.map(e=>e.name)));
  document.getElementById('stat-seances').textContent=filtered.length;
  document.getElementById('stat-exercices').textContent=exSet.size;
  document.getElementById('stat-series').textContent=ts;
}

function togglePrSelection(name){
  const allNames=[...new Set(sessions.filter(s=>s.sessionType!=='running').flatMap(s=>s.exercises.map(e=>e.name)))];
  const saved=JSON.parse(localStorage.getItem('il_pr_selection')||'null');
  let selected=saved||allNames;
  selected=selected.includes(name)?selected.filter(n=>n!==name):[...selected,name];
  localStorage.setItem('il_pr_selection',JSON.stringify(selected));
  renderAnalyse();
  setTimeout(()=>{const cfg=document.getElementById('pr-config');if(cfg)cfg.style.display='block';},0);
}

function renderAnalyse(){
  Object.values(charts).forEach(c=>c&&c.destroy&&c.destroy()); charts={};
  const el=document.getElementById('analyse-content');
  const muscuSessions=sessions.filter(s=>s.sessionType!=='running');
  const exCounts={};
  muscuSessions.forEach(s=>s.exercises.forEach(e=>{exCounts[e.name]=(exCounts[e.name]||0)+1;}));
  const top=Object.entries(exCounts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const allNames=[...new Set(muscuSessions.flatMap(s=>s.exercises.map(e=>e.name)))].sort();
  const initFiltered=filterSessionsByPeriod('month').filter(s=>s.sessionType!=='running');
  const initSeries=initFiltered.reduce((sum,s)=>sum+s.exercises.reduce((a,e)=>a+e.sets.length,0),0);
  const initExSet=new Set(initFiltered.flatMap(s=>s.exercises.map(e=>e.name)));

  // PR calc
  const prs={};
  sessions.forEach(s=>{s.exercises?.forEach(ex=>{
    if(!prs[ex.name])prs[ex.name]={maxWeight:0,maxWeightDate:'',maxReps:0,maxRepsDate:'',best1RM:0,type:ex.type};
    ex.sets.forEach(set=>{
      const w=parseFloat(set.weight)||0,r=parseInt(set.reps)||0;
      if(w>prs[ex.name].maxWeight){prs[ex.name].maxWeight=w;prs[ex.name].maxWeightDate=s.date;}
      if(r>prs[ex.name].maxReps){prs[ex.name].maxReps=r;prs[ex.name].maxRepsDate=s.date;}
      if(w>0&&r>0){const orm=Math.round(w*(1+r/30)*10)/10;if(orm>prs[ex.name].best1RM)prs[ex.name].best1RM=orm;}
    });
  });});
  const allPrNames=Object.keys(prs);
  const savedSel=JSON.parse(localStorage.getItem('il_pr_selection')||'null');
  const selected=savedSel||allPrNames;
  const prList=Object.entries(prs).filter(([name])=>selected.includes(name));

  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div class="sec-label" style="margin-bottom:0;flex:1;">Statistiques</div>
      <select id="stats-period" class="period-select" onchange="updateStats()">
        <option value="week">Cette semaine</option>
        <option value="month" selected>Ce mois</option>
        <option value="year">Cette année</option>
      </select>
    </div>
    <div class="stats-grid">
      <div class="card stat-card"><div class="stat-val" id="stat-seances">${initFiltered.length}</div><div class="stat-lbl">Séances</div></div>
      <div class="card stat-card"><div class="stat-val" id="stat-exercices">${initExSet.size}</div><div class="stat-lbl">Exercices</div></div>
      <div class="card stat-card"><div class="stat-val" id="stat-series">${initSeries}</div><div class="stat-lbl">Séries</div></div>
    </div>

    ${top.length>0?`<div class="card"><div class="sec-label">Plus pratiqués</div>${top.map(([name,count],i)=>`<div class="top-ex-row"><span class="top-ex-rank">${i+1}</span><span style="flex:1;font-size:13px;font-weight:500;">${name}</span><div class="top-ex-bar" style="width:${(count/top[0][1])*100}px"></div><span class="top-ex-count">${count}×</span></div>`).join('')}</div>`:''}

    ${allPrNames.length>0?`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div class="sec-label" style="margin-bottom:0;flex:1;">🏆 Records personnels</div>
        <button onclick="document.getElementById('pr-config').style.display=document.getElementById('pr-config').style.display==='none'?'block':'none'" class="btn btn-ghost btn-sm">⚙️ Configurer</button>
      </div>
      <div id="pr-config" style="display:none;background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px;border:1px solid var(--border);">
        <div style="font-family:var(--mono);font-size:10px;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;">Sélectionner les exercices</div>
        ${allPrNames.map(name=>`
          <div class="pr-check-item ${selected.includes(name)?'selected':''}" onclick="togglePrSelection('${name}')">
            <div class="pr-checkbox">${selected.includes(name)?'<span style="color:#fff;font-size:11px;">✓</span>':''}</div>
            <span style="font-size:13px;">${name}</span>
          </div>`).join('')}
      </div>
      ${prList.length===0?'<div class="no-data">Aucun exercice sélectionné</div>':
        prList.map(([name,pr])=>`<div class="pr-item">
          <div class="pr-name">${name}</div>
          <div class="pr-metrics">
            ${pr.type==='weighted'?`
              <div class="pr-metric"><div class="pr-metric-label">Charge max</div><div class="pr-metric-val" style="color:var(--accent);">${pr.maxWeight} kg</div><div class="pr-metric-sub">${fmtDate(pr.maxWeightDate)}</div></div>
              <div class="pr-metric"><div class="pr-metric-label">1RM estimé</div><div class="pr-metric-val" style="color:var(--blue);">${pr.best1RM} kg</div><div class="pr-metric-sub">Formule Epley</div></div>`:''}
            <div class="pr-metric"><div class="pr-metric-label">Reps max</div><div class="pr-metric-val" style="color:var(--success);">${pr.maxReps}</div><div class="pr-metric-sub">${fmtDate(pr.maxRepsDate)}</div></div>
          </div>
        </div>`).join('')}
    </div>`:''}

    <div class="card">
      <div class="sec-label">Progression</div>
      <div style="margin-bottom:14px;">
        <label>Exercice</label>
        <select id="ex-sel" onchange="renderCharts()" style="margin-top:4px;">
          <option value="">— Sélectionner un exercice —</option>
          ${allNames.map(n=>`<option value="${n}">${n}</option>`).join('')}
        </select>
      </div>
      <div id="charts-area"></div>
    </div>`;
}

function renderCharts(){
  Object.keys(charts).filter(k=>!k.startsWith('mens-')).forEach(k=>{charts[k]&&charts[k].destroy&&charts[k].destroy();delete charts[k];});
  const sel=document.getElementById('ex-sel').value, area=document.getElementById('charts-area');
  if(!sel){area.innerHTML='';return;}
  const isW=sessions.some(s=>s.exercises?.some(e=>e.name===sel&&e.type==='weighted'));
  const data=sessions.filter(s=>s.exercises?.some(e=>e.name===sel)).sort((a,b)=>a.date.localeCompare(b.date)).map(s=>{
    const ex=s.exercises.find(e=>e.name===sel);
    const ws=ex.sets.map(s=>parseFloat(s.weight)||0).filter(w=>w>0);
    const rs=ex.sets.map(s=>parseInt(s.reps)||0);
    return{label:fmtDate(s.date),maxWeight:ws.length?Math.max(...ws):0,volume:ex.sets.reduce((sum,s)=>sum+(isW?(parseFloat(s.weight)||0)*(parseInt(s.reps)||0):(parseInt(s.reps)||0)),0),reps:rs.reduce((a,b)=>a+b,0),sets:ex.sets.length};
  });
  if(!data.length){area.innerHTML='<div class="no-data">Pas encore de données.</div>';return;}
  const labels=data.map(d=>d.label);
  const ttOpts={backgroundColor:'var(--surface)',borderColor:'var(--border)',borderWidth:1,titleColor:'var(--text)',bodyColor:'var(--text-2)',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono',size:12}};
  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:ttOpts},scales:{x:{grid:{color:'var(--border-light)'},ticks:{color:'var(--text-3)',font:{family:'DM Mono',size:10}}},y:{grid:{color:'var(--border-light)'},ticks:{color:'var(--text-3)',font:{family:'DM Mono',size:10}}}}};
  const perf=[...data].reverse().slice(0,8);
  let html='';
  if(isW) html+=`<div class="chart-title">Charge max (kg)</div><div class="chart-wrap"><canvas id="c-weight"></canvas></div>`;
  html+=`<div class="chart-title">${isW?'Volume (kg × reps)':'Répétitions'}</div><div class="chart-wrap"><canvas id="c-vol"></canvas></div>`;
  if(isW) html+=`<div class="chart-title">Répétitions</div><div class="chart-wrap"><canvas id="c-reps"></canvas></div>`;
  html+=`<div class="chart-title" style="margin-top:22px;">Dernières performances</div><table class="perf-table" style="margin-top:8px;"><thead><tr><th>Date</th><th>Séries</th><th>Reps</th>${isW?'<th>Charge max</th>':''}<th>Volume</th></tr></thead><tbody>${perf.map(d=>`<tr><td>${d.label}</td><td class="muted">${d.sets}</td><td>${d.reps}</td>${isW?`<td class="accent">${d.maxWeight?d.maxWeight+' kg':'—'}</td>`:''}<td class="muted">${d.volume}</td></tr>`).join('')}</tbody></table>`;
  area.innerHTML=html;
  const mk=(id,vals,color)=>{const c=document.getElementById(id);if(!c)return;charts[id]=new Chart(c,{type:'line',...{options:baseOpts},data:{labels,datasets:[{data:vals,borderColor:color,backgroundColor:color+'22',pointBackgroundColor:color,pointRadius:4,tension:0.3,fill:true}]}});};
  if(isW)mk('c-weight',data.map(d=>d.maxWeight),'#B8860B');
  mk('c-vol',data.map(d=>d.volume),'#2D6A4F');
  if(isW)mk('c-reps',data.map(d=>d.reps),'#1B4F8A');
}

// ─── MENSURATIONS ─────────────────────────────────────────────────────────────
const MENS_FIELDS=[
  {id:'poids',label:'Poids',unit:'kg',color:'#B8860B'},
  {id:'poitrine',label:'Poitrine',unit:'cm',color:'#1B4F8A'},
  {id:'bras',label:'Bras',unit:'cm',color:'#2D6A4F'},
  {id:'taille',label:'Taille',unit:'cm',color:'#7B3F00'},
  {id:'cuisse',label:'Cuisse',unit:'cm',color:'#5B2D8A'},
  {id:'mollet',label:'Mollet',unit:'cm',color:'#9B2335'},
];

async function saveMensuration(){
  const date=document.getElementById('mens-date').value; if(!date){showMensAlert('Sélectionne une date','error');return;}
  const entry={id:Date.now().toString(),date}; let hasValue=false;
  MENS_FIELDS.forEach(f=>{const val=parseFloat(document.getElementById('mens-'+f.id)?.value);if(!isNaN(val)&&val>0){entry[f.id]=val;hasValue=true;}});
  if(!hasValue){showMensAlert('Remplis au moins une mesure','error');return;}
  setSyncStatus('loading','Sauvegarde...');
  try{await fetch(SCRIPT_URL+'?action=saveMensuration',{method:'POST',body:JSON.stringify(entry)});mensurations.unshift(entry);localStorage.setItem('il_mens_cache',JSON.stringify(mensurations));setSyncStatus('ok','Synchronisé');MENS_FIELDS.forEach(f=>{const el=document.getElementById('mens-'+f.id);if(el)el.value='';});document.getElementById('mens-date').value=new Date().toISOString().split('T')[0];showMensAlert('✓ Mesures enregistrées !','success');renderMensurations();}
  catch(e){setSyncStatus('error','Erreur sync');showMensAlert('✕ Erreur de connexion','error');}
}
async function deleteMensuration(id){try{await fetch(SCRIPT_URL+'?action=deleteMensuration&id='+id);mensurations=mensurations.filter(m=>m.id!==id);localStorage.setItem('il_mens_cache',JSON.stringify(mensurations));renderMensurations();}catch(e){alert('Erreur');}}
function showMensAlert(msg,type){const el=document.getElementById('mens-alert');el.className='alert alert-'+type;el.textContent=msg;el.style.display='flex';setTimeout(()=>el.style.display='none',3000);}

function renderMensurations(){
  Object.keys(charts).filter(k=>k.startsWith('mens-')).forEach(k=>{charts[k]&&charts[k].destroy&&charts[k].destroy();delete charts[k];});
  const histEl=document.getElementById('mens-history'), chartsEl=document.getElementById('mens-charts-area');
  if(!mensurations.length){histEl.innerHTML='<div class="empty">Aucune mesure<div class="empty-sub">Commence ton suivi corporel</div></div>';chartsEl.innerHTML='';return;}
  const last=[...mensurations].sort((a,b)=>b.date.localeCompare(a.date))[0];
  const lastHTML=MENS_FIELDS.filter(f=>last[f.id]).map(f=>`<div class="mens-item"><div class="mens-label">${f.label}</div><div class="mens-val" style="color:${f.color}">${last[f.id]}</div><div class="mens-unit">${f.unit}</div></div>`).join('');
  histEl.innerHTML=`<div class="card" style="margin-bottom:14px;"><div class="sec-label">Dernières mesures · ${fmtDate(last.date)}</div><div class="mens-summary">${lastHTML}</div></div>
  <div class="card"><div class="sec-label">Historique</div><table style="width:100%;border-collapse:collapse;font-size:12px;font-family:var(--mono);">
    <thead><tr><th style="text-align:left;padding:5px 8px;color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);">Date</th>${MENS_FIELDS.map(f=>`<th style="text-align:right;padding:5px 8px;color:${f.color};font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);">${f.label}</th>`).join('')}<th style="border-bottom:1px solid var(--border);"></th></tr></thead>
    <tbody>${mensurations.map(m=>`<tr style="border-bottom:1px solid var(--border-light);"><td style="padding:8px;">${fmtDate(m.date)}</td>${MENS_FIELDS.map(f=>`<td style="text-align:right;padding:8px;color:${m[f.id]?f.color:'var(--text-3)'};">${m[f.id]?m[f.id]+' '+f.unit:'—'}</td>`).join('')}<td style="padding:8px 4px;text-align:right;"><button onclick="deleteMensuration('${m.id}')" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:11px;">✕</button></td></tr>`).join('')}</tbody>
  </table></div>`;
  const sorted=[...mensurations].sort((a,b)=>a.date.localeCompare(b.date));
  const labels=sorted.map(m=>fmtDate(m.date));
  let chartsHTML='<div class="card"><div class="sec-label">Évolution</div>';
  MENS_FIELDS.forEach(f=>{if(sorted.some(m=>m[f.id]))chartsHTML+=`<div class="chart-title">${f.label} (${f.unit})</div><div class="chart-wrap"><canvas id="mens-${f.id}"></canvas></div>`;});
  chartsHTML+='</div>'; chartsEl.innerHTML=chartsHTML;
  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'var(--surface)',borderColor:'var(--border)',borderWidth:1,titleColor:'var(--text)',bodyColor:'var(--text-2)',titleFont:{family:'DM Mono'},bodyFont:{family:'DM Mono',size:12}}},scales:{x:{grid:{color:'var(--border-light)'},ticks:{color:'var(--text-3)',font:{family:'DM Mono',size:10}}},y:{grid:{color:'var(--border-light)'},ticks:{color:'var(--text-3)',font:{family:'DM Mono',size:10}}}}};
  setTimeout(()=>{MENS_FIELDS.forEach(f=>{const c=document.getElementById('mens-'+f.id);if(!c)return;const vals=sorted.map(m=>m[f.id]||null);charts['mens-'+f.id]=new Chart(c,{type:'line',options:baseOpts,data:{labels,datasets:[{data:vals,borderColor:f.color,backgroundColor:f.color+'18',pointBackgroundColor:f.color,pointRadius:4,tension:0.3,fill:true,spanGaps:true}]}});});},50);
}
</script>
